<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Landscape Planner</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #faf7f1;
        color: #2c2a25;
      }
      header {
        padding: 16px 22px 4px;
      }
      h1 {
        margin: 0 0 3px;
        font-size: 20px;
      }
      .sub {
        margin: 0;
        color: #6b6557;
        font-size: 13px;
      }
      svg#yard {
        width: 96%;
        height: auto;
        display: block;
        margin: 8px auto;
        touch-action: none;
        user-select: none;
      }
      .yard-controls {
        display: flex;
        gap: 18px;
        padding: 6px 22px;
        font-size: 13px;
        color: #6b6557;
      }
      .yard-controls input {
        width: 70px;
        font: inherit;
        padding: 3px 6px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
      }
      /* Drawing toolbar: House / Deck / Snap clusters. */
      .tools {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        padding: 8px 22px;
        align-items: flex-start;
      }
      .tool-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .tool-group-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a8275;
      }
      .tool-group-items {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .tools button {
        font: inherit;
        font-size: 13px;
        padding: 4px 10px;
        border: 1px solid #e3dccb;
        border-radius: 8px;
        background: #fff;
        color: inherit;
        cursor: pointer;
      }
      .tools button:hover {
        background: #efe9dc;
      }
      .tools button.active {
        background: #5c6b4f;
        color: #fff;
        border-color: #5c6b4f;
      }
      .tools .number-field,
      .tools .toggle {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 13px;
        color: #6b6557;
      }
      .tools .number-field input {
        width: 60px;
        font: inherit;
        padding: 3px 6px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
      }
      .hint {
        margin: 2px 22px 0;
        font-size: 12px;
        color: #8a8275;
      }
    </style>
  </head>
  <body></body>
</html>
