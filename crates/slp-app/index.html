<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Landscape Planner</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <!--
      File System Access API bridge (G1.2/G1.3): named Save/Save As, in-place
      Save, and reopen-the-last-file-on-startup. Encapsulates the browser FSA +
      IndexedDB glue behind a small promise API the WASM app calls (see
      slp-ui `fs_access`). Defined before the wasm loads so startup reopen can
      run on mount. Absent capability (Firefox/Safari) => slpFs.supported() is
      false and the app uses the download/<input> fallback. Methods return a
      JSON string or null so the Rust side parses trivially.
    -->
    <script>
      (() => {
        const DB = "slp", STORE = "handles", KEY = "current";
        const types = [{
          description: "SLP plan",
          accept: { "application/json": [".slp.json", ".json"] },
        }];
        let handle = null, name = null;

        const supported = () =>
          typeof window.showSaveFilePicker === "function" &&
          typeof window.showOpenFilePicker === "function";

        const idb = () => new Promise((res, rej) => {
          const r = indexedDB.open(DB, 1);
          r.onupgradeneeded = () => r.result.createObjectStore(STORE);
          r.onsuccess = () => res(r.result);
          r.onerror = () => rej(r.error);
        });
        async function idbPut(v) {
          const db = await idb();
          await new Promise((res, rej) => {
            const tx = db.transaction(STORE, "readwrite");
            tx.objectStore(STORE).put(v, KEY);
            tx.oncomplete = res;
            tx.onerror = () => rej(tx.error);
          });
          db.close();
        }
        async function idbGet() {
          const db = await idb();
          const v = await new Promise((res, rej) => {
            const rq = db.transaction(STORE, "readonly").objectStore(STORE).get(KEY);
            rq.onsuccess = () => res(rq.result);
            rq.onerror = () => rej(rq.error);
          });
          db.close();
          return v;
        }
        async function writeTo(h, text) {
          const w = await h.createWritable();
          await w.write(text);
          await w.close();
        }
        async function readOf(h) {
          return await (await h.getFile()).text();
        }

        window.slpFs = {
          supported,
          currentName: () => name,
          // Prompt for a name/location, write, remember + persist the handle.
          async saveAs(text, suggestedName) {
            try {
              const h = await window.showSaveFilePicker({ suggestedName, types });
              await writeTo(h, text);
              handle = h; name = h.name; await idbPut(h);
              return JSON.stringify({ name });
            } catch { return null; } // user cancelled
          },
          // Write to the current file (no dialog); null => no current file yet.
          async save(text) {
            if (!handle) return null;
            await writeTo(handle, text);
            return JSON.stringify({ name });
          },
          // Pick a file to open; remember + persist the handle.
          async open() {
            try {
              const [h] = await window.showOpenFilePicker({ types });
              const text = await readOf(h);
              handle = h; name = h.name; await idbPut(h);
              return JSON.stringify({ name, plan: text });
            } catch { return null; }
          },
          // On startup: if a handle is remembered and read permission still
          // stands, load it silently; else report it needs a gesture.
          async reopen() {
            let h;
            try { h = await idbGet(); } catch { return null; }
            if (!h) return null;
            handle = h; name = h.name;
            let perm = "prompt";
            try { perm = await h.queryPermission({ mode: "read" }); } catch {}
            if (perm === "granted") {
              try {
                return JSON.stringify({ name, plan: await readOf(h), silent: true });
              } catch { return JSON.stringify({ name, silent: false }); }
            }
            return JSON.stringify({ name, silent: false });
          },
          // The "Reopen <name>" gesture: request permission, then read.
          async reopenGrant() {
            if (!handle) {
              try { handle = await idbGet(); } catch { return null; }
            }
            if (!handle) return null;
            let perm = "denied";
            try { perm = await handle.requestPermission({ mode: "read" }); } catch {}
            if (perm !== "granted") return null;
            try {
              name = handle.name;
              return JSON.stringify({ name, plan: await readOf(handle) });
            } catch { return null; }
          },
        };
      })();

      // Screenshot ingestion (B3): POST a pasted screenshot + prompt to the
      // Anthropic Messages API with the user's key, browser-direct, and return
      // the model's text. Nothing is stored here; the key is passed per call.
      window.slpVision = {
        async extract(apiKey, model, dataUri, prompt, schemaJson) {
          const m = /^data:(.+?);base64,(.*)$/.exec(dataUri || "");
          if (!m) throw new Error("The pasted image isn't a base64 data URI.");
          const [, mediaType, data] = m;
          // Force a structured tool call: the model must return `input` matching
          // our JSON Schema, rather than free-form text we'd have to parse.
          const resp = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "content-type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model,
              max_tokens: 1024,
              tools: [{
                name: "extract_product",
                description: "Record the landscaping product shown in the screenshot.",
                input_schema: JSON.parse(schemaJson),
              }],
              tool_choice: { type: "tool", name: "extract_product" },
              messages: [{
                role: "user",
                content: [
                  { type: "image", source: { type: "base64", media_type: mediaType, data } },
                  { type: "text", text: prompt },
                ],
              }],
            }),
          });
          if (!resp.ok) {
            let detail = "";
            try { detail = (await resp.json()).error?.message || ""; } catch {}
            throw new Error("Anthropic API error " + resp.status + (detail ? ": " + detail : ""));
          }
          const body = await resp.json();
          const tu = (body.content || []).find(
            (b) => b.type === "tool_use" && b.name === "extract_product"
          );
          if (!tu) throw new Error("The model didn't return structured product data.");
          return JSON.stringify(tu.input);
        },
      };
    </script>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #faf7f1;
        color: #2c2a25;
      }
      header {
        padding: 16px 22px 4px;
      }
      h1 {
        margin: 0 0 3px;
        font-size: 20px;
      }
      .sub {
        margin: 0;
        color: #6b6557;
        font-size: 13px;
      }
      svg#yard {
        width: 96%;
        height: auto;
        display: block;
        margin: 8px auto;
        touch-action: none;
        user-select: none;
      }
      /* Placed objects — grab the body to move it, the handle to rotate it. */
      .furniture-item {
        cursor: move;
      }
      .rotate-handle {
        cursor: grab;
      }
      .rotate-handle:active {
        cursor: grabbing;
      }
      .yard-controls {
        display: flex;
        gap: 18px;
        padding: 6px 22px;
        font-size: 13px;
        color: #6b6557;
      }
      .yard-controls input {
        width: 70px;
        font: inherit;
        padding: 3px 6px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
      }
      /* Drawing toolbar: House / Deck / Snap clusters. */
      .tools {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        padding: 8px 22px;
        align-items: flex-start;
      }
      /* The current file name (File System Access path); Save targets it. */
      .current-file {
        align-self: center;
        font-size: 12px;
        color: #6b6557;
        max-width: 160px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      /* One-click reopen of the last file when its permission has lapsed. */
      .reopen-chip {
        border-color: #2b6cb0 !important;
        background: #eef4fb !important;
        color: #2b6cb0;
      }
      /* A control that isn't available in this browser (e.g. Save As without
         the File System Access API). */
      .tools button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      /* The Save-As-is-Chromium-only footnote. */
      .fsa-note {
        margin: 0 22px 8px;
        font-size: 12px;
        color: #8a8275;
      }
      /* Why a picked .slp.json wouldn't load (the current plan is untouched). */
      .load-error {
        margin: 0 22px 8px;
        padding: 6px 10px;
        border: 1px solid #d4351c;
        border-radius: 6px;
        background: #fdecea;
        color: #7a1216;
        font-size: 13px;
      }
      .tool-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .tool-group-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a8275;
      }
      .tool-group-items {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .tools button {
        font: inherit;
        font-size: 13px;
        padding: 4px 10px;
        border: 1px solid #e3dccb;
        border-radius: 8px;
        background: #fff;
        color: inherit;
        cursor: pointer;
      }
      .tools button:hover {
        background: #efe9dc;
      }
      .tools button.active {
        background: #5c6b4f;
        color: #fff;
        border-color: #5c6b4f;
      }
      .tools .number-field,
      .tools .toggle {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 13px;
        color: #6b6557;
      }
      .tools .number-field input {
        width: 60px;
        font: inherit;
        padding: 3px 6px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
      }
      .hint {
        margin: 2px 22px 0;
        font-size: 12px;
        color: #8a8275;
      }
      /* Object palette: click-to-place tiles, grouped by category, along a bar
         below the drawing tools. */
      .object-palette {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        padding: 4px 22px 8px;
        align-items: flex-start;
      }
      .palette-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .palette-group-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a8275;
      }
      .palette-tiles {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .palette-tile {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font: inherit;
        font-size: 12px;
        padding: 4px 9px;
        border: 1px solid #e3dccb;
        border-radius: 8px;
        background: #fff;
        color: inherit;
        cursor: pointer;
      }
      .palette-tile:hover {
        background: #efe9dc;
      }
      .palette-tile.armed {
        background: #5c6b4f;
        color: #fff;
        border-color: #5c6b4f;
      }
      .palette-icon {
        flex: 0 0 auto;
      }
      .palette-price {
        color: #8a8275;
      }
      .palette-tile.armed .palette-price {
        color: #e6ecdd;
      }
      /* Canvas + estimate, side by side — the estimate wraps below the canvas
         when the window is too narrow to keep the canvas at a usable width. */
      .stage {
        display: flex;
        flex-wrap: wrap;
        /* Grid ↔ estimate gap matches the page's side margin. */
        gap: 22px;
        align-items: flex-start;
        padding: 0 22px 16px;
      }
      .canvas {
        position: relative; /* the object inspector floats in its corners */
        flex: 1 1 360px;
        /* Keep a usable canvas width; below this the estimate wraps below
           rather than the grid being squished. Never exceed the row. */
        min-width: min(360px, 100%);
        margin: 8px 0;
      }
      /* Inspector windows: a small card that floats in an empty corner of the
         canvas when an object (ObjectInspector) or a drawn area (AreaInspector)
         is selected. Both share the same chrome and corner placement; only their
         contents differ. */
      .object-inspector,
      .area-inspector {
        /* Fixed to the viewport; top/left are set inline from the measured grid
           screen-rect so the window sits exactly inside the grid corner. */
        position: fixed;
        width: 190px;
        padding: 8px 12px 10px;
        background: #fff;
        border: 1px solid #e3dccb;
        border-radius: 10px;
        box-shadow: 0 2px 10px rgba(60, 50, 30, 0.12);
        font-size: 12px;
      }
      .inspector-name {
        margin: 0 0 6px;
        font-size: 13px;
      }
      .inspector-meta {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 2px 10px;
        margin: 0;
      }
      .inspector-meta dt {
        color: #8a8275;
      }
      .inspector-meta dd {
        margin: 0;
      }
      .inspector-reset {
        margin-left: 8px;
        font: inherit;
        font-size: 11px;
        padding: 1px 6px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .inspector-status {
        display: flex;
        gap: 4px;
        margin-top: 8px;
      }
      .inspector-status .status-btn {
        flex: 1;
        font: inherit;
        font-size: 12px;
        padding: 3px 4px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
        background: #fff;
        color: inherit;
        cursor: pointer;
      }
      .inspector-status .status-btn:hover {
        background: #efe9dc;
      }
      .inspector-status .status-btn.active {
        background: #2b6cb0;
        color: #fff;
        border-color: #2b6cb0;
      }
      /* Inspector number inputs — each `NumberField` its own row (the browser
         default input width and inline label wrap badly at this panel's 190px):
         a tree's canopy/trunk size, or an area's elevation/depth. */
      .inspector-tree-size,
      .inspector-area-size {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 8px;
      }
      .inspector-tree-size .number-field,
      .inspector-area-size .number-field {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        font-size: 12px;
        color: #6b6557;
      }
      .inspector-tree-size .number-field input,
      .inspector-area-size .number-field input {
        width: 50px;
        font: inherit;
        padding: 2px 5px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
      }
      /* The inspector's real/virtual checkbox — a plain `Toggle`, styled to
         match the compact inspector rather than the toolbar's `.tools .toggle`. */
      .object-inspector .toggle {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 8px;
        font-size: 12px;
        color: #6b6557;
      }
      .inspector-delete {
        margin-top: 8px;
        width: 100%;
        font: inherit;
        font-size: 12px;
        padding: 4px 8px;
        border: 1px solid #e0b4ac;
        border-radius: 7px;
        background: #fff;
        color: #a5352a;
        cursor: pointer;
      }
      .inspector-delete:hover {
        background: #fbecea;
      }
      /* The canvas is a plain block flex item so the SVG fills it predictably,
         instead of the SVG being sized by its own intrinsic aspect ratio. */
      .canvas svg#yard {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
      }
      /* Estimate side panel. */
      .estimate {
        flex: 0 0 240px;
        margin-top: 8px;
        padding: 10px 14px;
        border: 1px solid #e3dccb;
        border-radius: 10px;
        background: #fff;
        font-size: 13px;
      }
      .estimate h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      .estimate table {
        width: 100%;
        border-collapse: collapse;
      }
      .estimate th {
        text-align: left;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a8275;
        font-weight: 600;
        padding-bottom: 4px;
      }
      .estimate td {
        padding: 3px 0;
      }
      .estimate .estimate-qty,
      .estimate .estimate-unit,
      .estimate .estimate-line {
        text-align: right;
      }
      .estimate .estimate-grand td {
        border-top: 1px solid #e3dccb;
        padding-top: 6px;
        font-weight: 600;
      }
      .estimate-empty {
        margin: 0;
        color: #8a8275;
      }
      /* Catalog inspector: a drawer over the right edge to browse and edit the
         plan's catalog (the catalog-side counterpart of the object inspector). */
      .catalog-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 300px;
        z-index: 20;
        display: flex;
        flex-direction: column;
        padding: 12px 16px;
        background: #fff;
        border-left: 1px solid #e3dccb;
        box-shadow: -2px 0 12px rgba(60, 50, 30, 0.12);
        overflow-y: auto;
        font-size: 13px;
      }
      .catalog-panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .catalog-panel-head h2 {
        margin: 0;
        font-size: 15px;
      }
      .catalog-head-actions {
        display: flex;
        gap: 6px;
      }
      .catalog-add,
      .catalog-close {
        font: inherit;
        font-size: 12px;
        padding: 2px 8px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .catalog-add {
        border-color: #2b6cb0;
        color: #2b6cb0;
      }
      .ingest-section {
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #efeadd;
      }
      .ingest-title {
        margin: 0 0 4px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a7f68;
      }
      .ingest-status {
        margin: 4px 0 0;
        font-size: 11px;
      }
      .ingest-status--off {
        color: #8a7f68;
      }
      .ingest-status--on {
        color: #2f855a;
      }
      .ingest-paste {
        margin-top: 6px;
        padding: 14px 8px;
        border: 1px dashed #c9bfa6;
        border-radius: 6px;
        text-align: center;
        font-size: 11px;
        color: #8a7f68;
        cursor: text;
      }
      .ingest-paste:focus {
        outline: 2px solid #2b6cb0;
        outline-offset: 1px;
        color: #2b6cb0;
      }
      .ingest-shot {
        margin-top: 6px;
        display: flex;
        align-items: flex-start;
        gap: 6px;
      }
      .ingest-screenshot {
        max-width: 180px;
        max-height: 140px;
        border: 1px solid #e3dccb;
        border-radius: 4px;
      }
      .ingest-clear {
        font: inherit;
        font-size: 11px;
        padding: 2px 8px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .ingest-extract {
        margin-top: 6px;
        font: inherit;
        font-size: 12px;
        padding: 4px 10px;
        border: 1px solid #2b6cb0;
        border-radius: 6px;
        background: #2b6cb0;
        color: #fff;
        cursor: pointer;
      }
      .ingest-extract:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .ingest-error {
        margin: 6px 0 0;
        font-size: 11px;
        color: #c53030;
      }
      .ingest-draft {
        margin-top: 8px;
        padding: 8px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
        background: #fbf9f4;
      }
      .ingest-draft-name {
        margin: 0 0 2px;
        font-size: 13px;
      }
      .ingest-draft-meta {
        margin: 0 0 6px;
        font-size: 11px;
        color: #8a7f68;
      }
      .ingest-draft-group {
        margin-top: 4px;
      }
      .ingest-draft-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a7f68;
      }
      .ingest-variant-list {
        margin: 2px 0 0;
        padding-left: 16px;
        font-size: 11px;
      }
      .ingest-variant.unavailable {
        color: #bcae90;
        text-decoration: line-through;
      }
      .ingest-draft-notes {
        margin: 6px 0 0;
        font-size: 11px;
        font-style: italic;
        color: #8a7f68;
      }
      .catalog-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 10px;
      }
      .catalog-row {
        display: flex;
        align-items: center;
        font: inherit;
        text-align: left;
        padding: 4px 8px;
        border: 1px solid transparent;
        border-radius: 6px;
        background: none;
        cursor: pointer;
      }
      .catalog-row:hover {
        background: #f3efe5;
      }
      .catalog-row.selected {
        background: #eef4fb;
        border-color: #2b6cb0;
      }
      /* The material name grows so the price is pushed to the right edge and the
         swatch stays flush left. */
      .catalog-row-name {
        flex: 1;
      }
      .catalog-row-price {
        color: #6b6557;
      }
      /* A small material identity square: a photo thumbnail, or the flat
         category color. Shown in the catalog list, the area material picker,
         and the area inspector so a material reads the same everywhere. */
      .material-swatch {
        display: inline-block;
        width: 18px;
        height: 18px;
        margin-right: 6px;
        border: 1px solid #cbc4b2;
        border-radius: 4px;
        object-fit: cover;
        vertical-align: middle;
        flex-shrink: 0;
      }
      .area-inspector-material {
        display: flex;
        align-items: center;
      }
      .catalog-editor {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding-top: 10px;
        border-top: 1px solid #e3dccb;
      }
      .catalog-editor .text-field,
      .catalog-editor .number-field,
      .catalog-editor .select-field,
      .catalog-editor .file-input {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        color: #6b6557;
      }
