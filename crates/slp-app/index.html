<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Landscape Planner</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #faf7f1;
        color: #2c2a25;
      }
      header {
        padding: 16px 22px 4px;
      }
      h1 {
        margin: 0 0 3px;
        font-size: 20px;
      }
      .sub {
        margin: 0;
        color: #6b6557;
        font-size: 13px;
      }
      svg#yard {
        width: 96%;
        height: auto;
        display: block;
        margin: 8px auto;
        touch-action: none;
        user-select: none;
      }
      .yard-controls {
        display: flex;
        gap: 18px;
        padding: 6px 22px;
        font-size: 13px;
        color: #6b6557;
      }
      .yard-controls input {
        width: 70px;
        font: inherit;
        padding: 3px 6px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
      }
      /* Drawing toolbar: House / Deck / Snap clusters. */
      .tools {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        padding: 8px 22px;
        align-items: flex-start;
      }
      .tool-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .tool-group-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a8275;
      }
      .tool-group-items {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .tools button {
        font: inherit;
        font-size: 13px;
        padding: 4px 10px;
        border: 1px solid #e3dccb;
        border-radius: 8px;
        background: #fff;
        color: inherit;
        cursor: pointer;
      }
      .tools button:hover {
        background: #efe9dc;
      }
      .tools button.active {
        background: #5c6b4f;
        color: #fff;
        border-color: #5c6b4f;
      }
      .tools .number-field,
      .tools .toggle {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 13px;
        color: #6b6557;
      }
      .tools .number-field input {
        width: 60px;
        font: inherit;
        padding: 3px 6px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
      }
      .hint {
        margin: 2px 22px 0;
        font-size: 12px;
        color: #8a8275;
      }
      /* Catalog picker select, in the toolbar. */
      .tools .catalog-picker {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 13px;
        color: #6b6557;
      }
      .tools .catalog-picker select {
        font: inherit;
        font-size: 13px;
        padding: 3px 6px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
        background: #fff;
      }
      /* Canvas + estimate, side by side — the estimate wraps below the canvas
         when the window is too narrow to keep the canvas at a usable width. */
      .stage {
        display: flex;
        flex-wrap: wrap;
        /* Grid ↔ estimate gap matches the page's side margin. */
        gap: 22px;
        align-items: flex-start;
        padding: 0 22px 16px;
      }
      .canvas {
        position: relative; /* the object inspector floats in its corners */
        flex: 1 1 360px;
        /* Keep a usable canvas width; below this the estimate wraps below
           rather than the grid being squished. Never exceed the row. */
        min-width: min(360px, 100%);
        margin: 8px 0;
      }
      /* Object inspector: floats in an empty corner of the canvas when a placed
         object is selected. */
      .object-inspector {
        /* Fixed to the viewport; top/left are set inline from the measured grid
           screen-rect so the window sits exactly inside the grid corner. */
        position: fixed;
        width: 190px;
        padding: 8px 12px 10px;
        background: #fff;
        border: 1px solid #e3dccb;
        border-radius: 10px;
        box-shadow: 0 2px 10px rgba(60, 50, 30, 0.12);
        font-size: 12px;
      }
      .inspector-name {
        margin: 0 0 6px;
        font-size: 13px;
      }
      .inspector-meta {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 2px 10px;
        margin: 0;
      }
      .inspector-meta dt {
        color: #8a8275;
      }
      .inspector-meta dd {
        margin: 0;
      }
      .inspector-reset {
        margin-left: 8px;
        font: inherit;
        font-size: 11px;
        padding: 1px 6px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .inspector-status {
        display: flex;
        gap: 4px;
        margin-top: 8px;
      }
      .inspector-status .status-btn {
        flex: 1;
        font: inherit;
        font-size: 12px;
        padding: 3px 4px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
        background: #fff;
        color: inherit;
        cursor: pointer;
      }
      .inspector-status .status-btn:hover {
        background: #efe9dc;
      }
      .inspector-status .status-btn.active {
        background: #2b6cb0;
        color: #fff;
        border-color: #2b6cb0;
      }
      /* The canvas is a plain block flex item so the SVG fills it predictably,
         instead of the SVG being sized by its own intrinsic aspect ratio. */
      .canvas svg#yard {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
      }
      /* Estimate side panel. */
      .estimate {
        flex: 0 0 240px;
        margin-top: 8px;
        padding: 10px 14px;
        border: 1px solid #e3dccb;
        border-radius: 10px;
        background: #fff;
        font-size: 13px;
      }
      .estimate h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      .estimate table {
        width: 100%;
        border-collapse: collapse;
      }
      .estimate th {
        text-align: left;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a8275;
        font-weight: 600;
        padding-bottom: 4px;
      }
      .estimate td {
        padding: 3px 0;
      }
      .estimate .estimate-qty,
      .estimate .estimate-unit,
      .estimate .estimate-line {
        text-align: right;
      }
      .estimate .estimate-grand td {
        border-top: 1px solid #e3dccb;
        padding-top: 6px;
        font-weight: 600;
      }
      .estimate-empty {
        margin: 0;
        color: #8a8275;
      }
    </style>
  </head>
  <body></body>
</html>
