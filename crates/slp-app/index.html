<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simple Landscape Planner</title>
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <style>
      body {
        margin: 0;
        font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #faf7f1;
        color: #2c2a25;
      }
      header {
        padding: 16px 22px 4px;
      }
      h1 {
        margin: 0 0 3px;
        font-size: 20px;
      }
      .sub {
        margin: 0;
        color: #6b6557;
        font-size: 13px;
      }
      svg#yard {
        width: 96%;
        height: auto;
        display: block;
        margin: 8px auto;
        touch-action: none;
        user-select: none;
      }
      /* Placed objects — grab the body to move it, the handle to rotate it. */
      .furniture-item {
        cursor: move;
      }
      .rotate-handle {
        cursor: grab;
      }
      .rotate-handle:active {
        cursor: grabbing;
      }
      .yard-controls {
        display: flex;
        gap: 18px;
        padding: 6px 22px;
        font-size: 13px;
        color: #6b6557;
      }
      .yard-controls input {
        width: 70px;
        font: inherit;
        padding: 3px 6px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
      }
      /* Drawing toolbar: House / Deck / Snap clusters. */
      .tools {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        padding: 8px 22px;
        align-items: flex-start;
      }
      .tool-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .tool-group-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a8275;
      }
      .tool-group-items {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .tools button {
        font: inherit;
        font-size: 13px;
        padding: 4px 10px;
        border: 1px solid #e3dccb;
        border-radius: 8px;
        background: #fff;
        color: inherit;
        cursor: pointer;
      }
      .tools button:hover {
        background: #efe9dc;
      }
      .tools button.active {
        background: #5c6b4f;
        color: #fff;
        border-color: #5c6b4f;
      }
      .tools .number-field,
      .tools .toggle {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 13px;
        color: #6b6557;
      }
      .tools .number-field input {
        width: 60px;
        font: inherit;
        padding: 3px 6px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
      }
      .hint {
        margin: 2px 22px 0;
        font-size: 12px;
        color: #8a8275;
      }
      /* Object palette: click-to-place tiles, grouped by category, along a bar
         below the drawing tools. */
      .object-palette {
        display: flex;
        flex-wrap: wrap;
        gap: 18px;
        padding: 4px 22px 8px;
        align-items: flex-start;
      }
      .palette-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .palette-group-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a8275;
      }
      .palette-tiles {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .palette-tile {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font: inherit;
        font-size: 12px;
        padding: 4px 9px;
        border: 1px solid #e3dccb;
        border-radius: 8px;
        background: #fff;
        color: inherit;
        cursor: pointer;
      }
      .palette-tile:hover {
        background: #efe9dc;
      }
      .palette-tile.armed {
        background: #5c6b4f;
        color: #fff;
        border-color: #5c6b4f;
      }
      .palette-icon {
        flex: 0 0 auto;
      }
      .palette-price {
        color: #8a8275;
      }
      .palette-tile.armed .palette-price {
        color: #e6ecdd;
      }
      /* Canvas + estimate, side by side — the estimate wraps below the canvas
         when the window is too narrow to keep the canvas at a usable width. */
      .stage {
        display: flex;
        flex-wrap: wrap;
        /* Grid ↔ estimate gap matches the page's side margin. */
        gap: 22px;
        align-items: flex-start;
        padding: 0 22px 16px;
      }
      .canvas {
        position: relative; /* the object inspector floats in its corners */
        flex: 1 1 360px;
        /* Keep a usable canvas width; below this the estimate wraps below
           rather than the grid being squished. Never exceed the row. */
        min-width: min(360px, 100%);
        margin: 8px 0;
      }
      /* Inspector windows: a small card that floats in an empty corner of the
         canvas when an object (ObjectInspector) or a drawn area (AreaInspector)
         is selected. Both share the same chrome and corner placement; only their
         contents differ. */
      .object-inspector,
      .area-inspector {
        /* Fixed to the viewport; top/left are set inline from the measured grid
           screen-rect so the window sits exactly inside the grid corner. */
        position: fixed;
        width: 190px;
        padding: 8px 12px 10px;
        background: #fff;
        border: 1px solid #e3dccb;
        border-radius: 10px;
        box-shadow: 0 2px 10px rgba(60, 50, 30, 0.12);
        font-size: 12px;
      }
      .inspector-name {
        margin: 0 0 6px;
        font-size: 13px;
      }
      .inspector-meta {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 2px 10px;
        margin: 0;
      }
      .inspector-meta dt {
        color: #8a8275;
      }
      .inspector-meta dd {
        margin: 0;
      }
      .inspector-reset {
        margin-left: 8px;
        font: inherit;
        font-size: 11px;
        padding: 1px 6px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .inspector-status {
        display: flex;
        gap: 4px;
        margin-top: 8px;
      }
      .inspector-status .status-btn {
        flex: 1;
        font: inherit;
        font-size: 12px;
        padding: 3px 4px;
        border: 1px solid #e3dccb;
        border-radius: 7px;
        background: #fff;
        color: inherit;
        cursor: pointer;
      }
      .inspector-status .status-btn:hover {
        background: #efe9dc;
      }
      .inspector-status .status-btn.active {
        background: #2b6cb0;
        color: #fff;
        border-color: #2b6cb0;
      }
      /* Inspector number inputs — each `NumberField` its own row (the browser
         default input width and inline label wrap badly at this panel's 190px):
         a tree's canopy/trunk size, or an area's elevation/depth. */
      .inspector-tree-size,
      .inspector-area-size {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-top: 8px;
      }
      .inspector-tree-size .number-field,
      .inspector-area-size .number-field {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        font-size: 12px;
        color: #6b6557;
      }
      .inspector-tree-size .number-field input,
      .inspector-area-size .number-field input {
        width: 50px;
        font: inherit;
        padding: 2px 5px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
      }
      /* The inspector's real/virtual checkbox — a plain `Toggle`, styled to
         match the compact inspector rather than the toolbar's `.tools .toggle`. */
      .object-inspector .toggle {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-top: 8px;
        font-size: 12px;
        color: #6b6557;
      }
      .inspector-delete {
        margin-top: 8px;
        width: 100%;
        font: inherit;
        font-size: 12px;
        padding: 4px 8px;
        border: 1px solid #e0b4ac;
        border-radius: 7px;
        background: #fff;
        color: #a5352a;
        cursor: pointer;
      }
      .inspector-delete:hover {
        background: #fbecea;
      }
      /* The canvas is a plain block flex item so the SVG fills it predictably,
         instead of the SVG being sized by its own intrinsic aspect ratio. */
      .canvas svg#yard {
        display: block;
        width: 100%;
        height: auto;
        margin: 0;
      }
      /* Estimate side panel. */
      .estimate {
        flex: 0 0 240px;
        margin-top: 8px;
        padding: 10px 14px;
        border: 1px solid #e3dccb;
        border-radius: 10px;
        background: #fff;
        font-size: 13px;
      }
      .estimate h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }
      .estimate table {
        width: 100%;
        border-collapse: collapse;
      }
      .estimate th {
        text-align: left;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a8275;
        font-weight: 600;
        padding-bottom: 4px;
      }
      .estimate td {
        padding: 3px 0;
      }
      .estimate .estimate-qty,
      .estimate .estimate-unit,
      .estimate .estimate-line {
        text-align: right;
      }
      .estimate .estimate-grand td {
        border-top: 1px solid #e3dccb;
        padding-top: 6px;
        font-weight: 600;
      }
      .estimate-empty {
        margin: 0;
        color: #8a8275;
      }
      /* Catalog inspector: a drawer over the right edge to browse and edit the
         plan's catalog (the catalog-side counterpart of the object inspector). */
      .catalog-panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 300px;
        z-index: 20;
        display: flex;
        flex-direction: column;
        padding: 12px 16px;
        background: #fff;
        border-left: 1px solid #e3dccb;
        box-shadow: -2px 0 12px rgba(60, 50, 30, 0.12);
        overflow-y: auto;
        font-size: 13px;
      }
      .catalog-panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .catalog-panel-head h2 {
        margin: 0;
        font-size: 15px;
      }
      .catalog-head-actions {
        display: flex;
        gap: 6px;
      }
      .catalog-add,
      .catalog-close {
        font: inherit;
        font-size: 12px;
        padding: 2px 8px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .catalog-add {
        border-color: #2b6cb0;
        color: #2b6cb0;
      }
      .catalog-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 10px;
      }
      .catalog-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font: inherit;
        text-align: left;
        padding: 4px 8px;
        border: 1px solid transparent;
        border-radius: 6px;
        background: none;
        cursor: pointer;
      }
      .catalog-row:hover {
        background: #f3efe5;
      }
      .catalog-row.selected {
        background: #eef4fb;
        border-color: #2b6cb0;
      }
      .catalog-row-price {
        color: #6b6557;
      }
      .catalog-editor {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding-top: 10px;
        border-top: 1px solid #e3dccb;
      }
      .catalog-editor .text-field,
      .catalog-editor .number-field,
      .catalog-editor .select-field,
      .catalog-editor .file-input {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        color: #6b6557;
      }
      /* The file picker keeps its native button; don't box it like a text input. */
      .catalog-editor .file-input input {
        width: auto;
        border: none;
        padding: 0;
      }
      .catalog-editor input,
      .catalog-editor select {
        width: 128px;
        font: inherit;
        padding: 3px 6px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
      }
      .catalog-image-preview {
        max-width: 100%;
        max-height: 96px;
        margin-top: 4px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
        object-fit: cover;
      }
      /* The composition editor: a paver area's sub-base courses, inside the
         area inspector. */
      .course-editor {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid #e3dccb;
      }
      .course-editor-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #8a8275;
        margin-bottom: 4px;
      }
      .course-row {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 4px;
      }
      .course-row .select-field {
        flex: 1;
        min-width: 0;
      }
      .course-row select {
        width: 100%;
        font: inherit;
        padding: 2px 4px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
      }
      .course-row input {
        width: 42px;
        font: inherit;
        padding: 2px 4px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
      }
      .course-remove {
        font: inherit;
        line-height: 1;
        padding: 2px 6px;
        border: 1px solid #e3dccb;
        border-radius: 6px;
        background: #fff;
        color: #a94442;
        cursor: pointer;
      }
      .course-add {
        font: inherit;
        font-size: 12px;
        padding: 2px 8px;
        border: 1px solid #2b6cb0;
        border-radius: 6px;
        background: #fff;
        color: #2b6cb0;
        cursor: pointer;
      }
    </style>
  </head>
  <body></body>
</html>
