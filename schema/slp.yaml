id: https://slp.seekingeta.ai/schema/slp
name: slp
description: |-
  The clean-sheet plan-file schema for the Simple Landscape Planner. LinkML is
  the single source of truth; panschema generates the Rust types into
  crates/slp-core/src/generated/. Starts minimal (yard size) and grows with
  shapes, materials, and settings as later slices need them.
license: MIT
version: 0.1.0

prefixes:
  linkml: https://w3id.org/linkml/
  slp: https://slp.seekingeta.ai/schema/slp/

default_prefix: slp
default_range: string

imports:
  - linkml:types

classes:
  Plan:
    description: A complete landscape plan.
    slots:
      - name
      - yard_width
      - yard_depth
      - house
      - deck
      - catalog
      - objects
      - shapes
      - circles
    slot_usage:
      yard_width:
        required: true
      yard_depth:
        required: true

  CatalogItem:
    description: |-
      A purchasable product or material the user has added to the plan's
      catalog. Objects reference it by `id`; drawn areas reference a *material*
      by `material_ref`. The footprint (`shape` + `width_ft`/`depth_ft`) and
      `height_ft` drive the 2D render and the future 3D view; `unit_price`
      drives cost, interpreted by `price_unit` (per item, per ft², per yd³ at a
      bed's depth, or per linear ft). `clearance_ft`, when present, is a
      recommended clear radius *beyond* the footprint edge (e.g. a fire pit's
      keep-clear zone from combustibles). `trunk_diameter_ft`, when present, is
      a tree's default trunk diameter (`width_ft` is its canopy diameter) — an
      object placing this catalog item may override both via
      `Object.canopy_diameter_ft`/`trunk_diameter_ft`. An item pulled in from a
      site (M4) carries provenance — `source_url`, `source`, `license`,
      `fetched_at`, `checksum` — and, for its full-res binary, an `asset` path
      into the gitignored `materials/cache/` (never committed; the inline swatch
      is `image`). All provenance fields are absent on hand-authored/starter
      items.
    slots:
      - id
      - name
      - category
      - unit_price
      - price_unit
      - shape
      - width_ft
      - depth_ft
      - height_ft
      - clearance_ft
      - trunk_diameter_ft
      - base_material_ref
      - base_depth_in
      - bedding_material_ref
      - bedding_depth_in
      - is_aggregate
      - image
      - tile_width_ft
      - tile_depth_ft
      - source_url
      - source
      - license
      - fetched_at
      - checksum
      - asset
    slot_usage:
      id:
        required: true

  Object:
    description: |-
      An item placed on the plan: a point at (`x`, `y`) in feet, rotated `rot`
      degrees clockwise, referencing a catalog item by `catalog_ref`. Two
      independent flags describe it: `status` (planned counts toward cost;
      existing does not, since it's already owned) and `is_virtual` (a what-if
      ghost duplicate at an alternate position — never counted, regardless of
      `status` — so a virtual object is never a second real item to buy).
      `canopy_diameter_ft`/`trunk_diameter_ft` override a tree's catalog
      defaults for this particular tree (e.g. a mature oak vs. a sapling);
      absent means use the catalog item's own size.
    slots:
      - catalog_ref
      - x
      - y
      - rot
      - status
      - is_virtual
      - canopy_diameter_ft
      - trunk_diameter_ft
    slot_usage:
      catalog_ref:
        required: true
      x:
        required: true
      y:
        required: true

  Deck:
    description: |-
      A deck or patio: one or more levels (footprints at an elevation) plus
      steps. Drawn by the user (never hardcoded).
    slots:
      - levels
      - steps

  DeckLevel:
    description: |-
      One deck platform — a footprint (closed outline of corners) at a given
      elevation in feet above grade. Always real (a structure, never a
      what-if ghost); `structure_status` distinguishes an already-built level
      from a planned addition, defaulting to existing since most decks are
      drawn to map what's already there.
    slots:
      - corners
      - elevation
      - structure_status
    slot_usage:
      elevation:
        required: true

  StepRun:
    description: |-
      A run of steps on an edge (a deck level or, later, a house wall): its top
      edge (a→b) extends outward and down to grade. No railings. The number of
      steps and the run depth are computed from the `elevation` drop (standard
      rise/tread), so only the edge + drop are stored.
    slots:
      - ax
      - ay
      - bx
      - by
      - elevation
    slot_usage:
      ax: { required: true }
      ay: { required: true }
      bx: { required: true }
      by: { required: true }
      elevation: { required: true }

  House:
    description: |-
      The house, drawn by the user as a closed outline of corner points (never
      hardcoded). Each wall is the edge between consecutive corners; doors and
      windows are placed along those walls. Always real (never a what-if
      ghost); `structure_status` distinguishes the already-built house from a
      planned addition, defaulting to existing since most houses are drawn to
      map what's already there.
    slots:
      - corners
      - openings
      - structure_status

  Opening:
    description: |-
      A door or window placed along a wall (the edge from corner `wall` to the
      next corner). Positioned by its `offset` in feet from the wall's start,
      spanning `width` feet.
    slots:
      - kind
      - wall
      - offset
      - width
    slot_usage:
      kind:
        required: true
      wall:
        required: true
      offset:
        required: true
      width:
        required: true

  Shape:
    description: |-
      A drawn area (a paver patio, a mulch bed, …) — a closed outline of
      nodes at a given elevation, the area equivalent of `Object`. Each edge
      (node→next) is a straight line by default, a circular arc when the
      matching `bulges` entry is non-zero, or a cubic-Bézier curve when a
      `curves` entry names it (a curve takes precedence over a bulge on the
      same edge). Category/pricing (which catalog item it costs against) is
      added when a category actually needs it (e.g. pavers, mulch beds) —
      `Shape` on its own is just geometry.
    slots:
      - corners
      - bulges
      - curves
      - elevation
      - material_ref
      - depth_in
      - courses
      - borders
    slot_usage:
      elevation:
        required: true

  Course:
    description: |-
      One sub-layer beneath a drawn surface — a paver's compacted gravel base or
      its bedding sand: the catalog material it's made of and its thickness in
      inches. An area's ordered `courses` are its build-up, held **per area**, so
      two patios can sit on different gravels at different depths. Costed by
      volume, `yd³ = ft²·depth_in / 324`.
    slots:
      - material_ref
      - depth_in
    slot_usage:
      material_ref:
        required: true
      depth_in:
        required: true

  Border:
    description: |-
      One border course along a drawn area's boundary — a contrasting paver
      laid as a soldier/sailor course, a cobble band, or a dedicated edging
      stone: the catalog material it's made of and the band's laid width in
      feet. With `start_node`/`end_node` absent it is a **full-perimeter
      ring**; with both set it is an **open span** covering the edges from
      `start_node` walking forward (in drawn node order, wrapping) to
      `end_node` — so a border can run along just one or two sides of a patio.
      An area's ordered `borders` run outermost first, each band hugging the
      boundary just inside the previous one; the field's surface material
      fills what remains. A per-ft² border material costs by band area
      (centerline length × width); a per-linear-ft material (edging stones)
      costs by centerline length. A `Circle` has no nodes, so its borders are
      always full rings (span fields are ignored).
    slots:
      - material_ref
      - width_ft
      - start_node
      - end_node
    slot_usage:
      material_ref:
        required: true
      width_ft:
        required: true
        description: The band's laid width, in feet.

  CurveEdge:
    description: |-
      A cubic-Bézier boundary edge on a `Shape`: the edge from node `edge` to
      node `edge + 1` curves through control points `control1` (near the start
      node) and `control2` (near the end node), the SVG `C` convention. Only
      the boundary's curved edges are listed; straight/arc edges are absent.
    slots:
      - edge
      - control1
      - control2
    slot_usage:
      edge:
        required: true
      control1:
        required: true
      control2:
        required: true

  Circle:
    description: |-
      A standalone circular drawn area (a round paver patio or mulch bed) — a
      center point + radius at a given elevation, the circle equivalent of
      `Shape`. A mostly-round bed with straight or bulging (arc) edges is
      still a `Shape` (arc edges, F3.2) — `Circle` is for a true circle.
    slots:
      - center
      - radius_ft
      - elevation
      - material_ref
      - depth_in
      - courses
      - borders
    slot_usage:
      center:
        required: true
      radius_ft:
        required: true
      elevation:
        required: true

  Coord:
    description: |-
      A point in the plan, in feet. The yard's south-west corner is the origin;
      +x runs east, +y runs north.
    slots:
      - x
      - y
    slot_usage:
      x:
        required: true
      y:
        required: true

slots:
  name:
    description: Human-readable name for this plan.
  yard_width:
    range: double
    description: Yard width (east-west), in feet.
  yard_depth:
    range: double
    description: Yard depth (north-south), in feet.
  house:
    range: House
    inlined: true
    description: The house outline, if the user has drawn one.
  deck:
    range: Deck
    inlined: true
    description: The deck outline, if the user has drawn one.
  catalog:
    range: CatalogItem
    multivalued: true
    inlined_as_list: true
    description: Products the user has added, available to place onto the plan.
  objects:
    range: Object
    multivalued: true
    inlined_as_list: true
    description: Items placed on the plan (furniture and, later, other objects).
  shapes:
    range: Shape
    multivalued: true
    inlined_as_list: true
    description: Drawn areas on the plan (paver patios, mulch beds, …).
  circles:
    range: Circle
    multivalued: true
    inlined_as_list: true
    description: Standalone circular drawn areas (round paver patios, mulch beds, …).
  center:
    range: Coord
    inlined: true
    description: A circle's center point, in feet.
  radius_ft:
    range: double
    description: A circle's radius, in feet.
  id:
    description: Stable identifier for a catalog item.
  category:
    description: Catalog category, e.g. "furniture", "mulch-bed", "paver".
  unit_price:
    range: double
    description: |-
      Price per unit, in dollars; the unit is `price_unit` (per item by
      default, or per ft²/yd³/linear-ft for a material).
  price_unit:
    range: PriceUnit
    ifabsent: PriceUnit(per_item)
    description: |-
      What `unit_price` is charged per — per item (objects) or per measured
      quantity of a material (per ft² of pavers, per yd³ of mulch/gravel at a
      bed's depth, per linear ft of edging). Defaults to per item.
  material_ref:
    description: |-
      Id of the catalog *material* a drawn area is made of (mulch, pavers, …),
      the area analogue of an object's `catalog_ref`. Absent = uncategorized
      geometry with no cost.
  base_material_ref:
    description: |-
      For an installed-surface material (pavers), the id of the catalog material
      forming its compacted base course (crushed gravel). Its volume is costed
      per drawn area of this material at `base_depth_in`. Absent = no base course.
  base_depth_in:
    range: double
    description: |-
      Thickness of the base course, in inches, for a material with a
      `base_material_ref` (e.g. a paver's ~4 in of gravel) — `yd³ = ft²·in/324`.
  bedding_material_ref:
    description: |-
      For an installed-surface material (pavers), the id of the catalog material
      forming its bedding layer (setting sand) directly under the surface. Its
      volume is costed per drawn area of this material at `bedding_depth_in`.
      Absent = no bedding layer.
  bedding_depth_in:
    range: double
    description: |-
      Thickness of the bedding layer, in inches, for a material with a
      `bedding_material_ref` (e.g. a paver's ~1 in of sand) — `yd³ = ft²·in/324`.
  is_aggregate:
    range: boolean
    ifabsent: boolean(false)
    description: |-
      Whether this material is a loose **aggregate** — crushed gravel, sand,
      stone dust — usable as a sub-base *course* layer beneath a drawn surface.
      Only aggregates are offered when composing an area's build-up; a surface or
      bed material (pavers, mulch) is not, so mulch is never laid under a paver.
      Defaults to false.
  image:
    description: |-
      A photo of the material, shown as its swatch in the catalog/picker/
      inspector and tiled across a drawn surface made of it. A user-added image
      is stored inline as a `data:` URI so it round-trips with the plan through
      localStorage and the exported file; a plain URL also works. (Ingested
      full-res binaries live in the gitignored `materials/cache/` via `asset`,
      never inline — see M4.) Absent = the flat category color.
  tile_width_ft:
    range: double
    description: |-
      The real-world **east–west** span of `image` in feet — how wide the photo's
      unit is on the ground — so it tiles a surface to scale. Paired with
      `tile_depth_ft` (they can differ: a paver unit is often rectangular).
      Absent/0 = a sensible default tile size.
  tile_depth_ft:
    range: double
    description: |-
      The real-world **north–south** span of `image` in feet — how deep the
      photo's unit is on the ground — the companion to `tile_width_ft`. Absent/0
      = a sensible default tile size.
  source_url:
    description: |-
      The product-page URL this item was ingested from (M4). Absent on
      hand-authored/starter items.
  source:
    description: |-
      Short id of the adapter/site the item came from, e.g. "techo-bloc" (M4) —
      the manufacturer/retailer, not a full URL. Absent on hand-authored items.
  license:
    description: |-
      The usage terms recorded for the ingested metadata/asset — the source's
      stated license or ToS reference. Provenance only: it never implies any
      right to redistribute a scraped binary (those stay in the gitignored
      cache, never committed). Absent on hand-authored items.
  fetched_at:
    description: |-
      ISO-8601 timestamp of when the item was fetched from `source_url` (M4).
      Absent on hand-authored items.
  checksum:
    description: |-
      Content hash of the fetched asset binary (e.g. "sha256:…"), for cache
      integrity and dedup across ingests (M4). Absent on hand-authored items.
  asset:
    description: |-
      Path, relative to the gitignored `materials/cache/`, of an ingested
      full-res binary for this item (M4) — never committed and never inlined
      (the inline swatch is `image`). Absent on hand-authored items.
  depth_in:
    range: double
    description: |-
      A drawn area's material depth, in inches — used to cost a per-yd³
      material by volume (`yd³ = ft²·depth_in / 324`), e.g. a mulch bed.
  shape:
    range: FootprintShape
    ifabsent: FootprintShape(rectangle)
    description: |-
      The item's 2D footprint shape, defaulting to rectangle when absent. A
      `circle` (fire pit, round table) uses `width_ft` as its diameter and
      ignores `depth_ft`.
  width_ft:
    range: double
    description: Footprint width, in feet (a circle's diameter).
  depth_ft:
    range: double
    description: Footprint depth, in feet (unused for a circle).
  height_ft:
    range: double
    description: Item height, in feet (for the future 3D view).
  clearance_ft:
    range: double
    description: |-
      Recommended clear radius, in feet, beyond the footprint edge (e.g. a fire
      pit's keep-clear distance from combustibles). Absent means no clearance
      check applies.
  trunk_diameter_ft:
    range: double
    description: |-
      Trunk diameter, in feet (a tree's canopy uses `width_ft`). On a catalog
      item this is the species default, absent for non-tree categories; on a
      placed object it overrides that default for this particular tree, absent
      meaning use the catalog default.
  canopy_diameter_ft:
    range: double
    description: |-
      Overrides this object's canopy diameter, in feet, in place of its
      catalog item's `width_ft`. Absent means use the catalog default.
  catalog_ref:
    description: Id of the catalog item this object places.
  rot:
    range: double
    description: Rotation in degrees, clockwise from north.
  status:
    range: ItemStatus
    ifabsent: ItemStatus(planned)
    description: Cost status of a placed item; defaults to planned when absent.
  is_virtual:
    range: boolean
    ifabsent: false
    description: |-
      A what-if ghost duplicate at an alternate position, not a second real
      item — never counted toward cost regardless of `status`. Defaults to
      false (a real item) when absent.
  structure_status:
    range: ItemStatus
    ifabsent: ItemStatus(existing)
    description: |-
      Whether a structure (house, deck level) is already built (existing) or
      a planned addition, defaulting to existing when absent since most
      structures are drawn to map what's already there. A structure is always
      real — there's no virtual variant for a structure.
  corners:
    range: Coord
    multivalued: true
    inlined_as_list: true
    description: Ordered corner points of a closed outline (house wall or deck level).
  bulges:
    range: double
    multivalued: true
    inlined_as_list: true
    description: |-
      Per-edge arc bulge factors for a `Shape` (DXF convention: `tan(θ/4)`,
      the arc's signed subtended angle). `bulges[i]` is the edge from
      `corners[i]` to the next node; 0 (or absent) is a straight edge. A
      short or empty list leaves the trailing edges straight.
  curves:
    range: CurveEdge
    multivalued: true
    inlined_as_list: true
    description: |-
      Cubic-Bézier edges of a `Shape` — a sparse list naming only the curved
      edges (straight/arc edges are absent). Empty = no curves.
  courses:
    range: Course
    multivalued: true
    inlined_as_list: true
    description: |-
      A drawn area's ordered sub-layers beneath its surface material — a paver's
      gravel base then bedding sand — each a `{material_ref, depth_in}`. Empty =
      fall back to the surface material's catalog default courses (B2.2).
  borders:
    range: Border
    multivalued: true
    inlined_as_list: true
    description: |-
      A drawn area's ordered border rings, outermost first — each a
      `{material_ref, width_ft}` band hugging the boundary just inside the
      previous ring. Empty = no border; the surface material runs to the edge.
  start_node:
    range: integer
    description: |-
      The boundary node index a border span starts at. Set together with
      `end_node` to border only the edges between them (walking forward in
      node order, wrapping); absent (or set alone) = a full-perimeter ring.
  end_node:
    range: integer
    description: |-
      The boundary node index a border span ends at — the companion of
      `start_node`. The span covers the edges from `start_node` up to (not
      through) this node.
  edge:
    range: integer
    description: Index of the boundary edge (from node `edge` to node `edge + 1`).
  control1:
    range: Coord
    inlined: true
    description: The Bézier control point near the edge's start node.
  control2:
    range: Coord
    inlined: true
    description: The Bézier control point near the edge's end node.
  levels:
    range: DeckLevel
    multivalued: true
    inlined_as_list: true
    description: The deck's platforms, each a footprint at an elevation.
  steps:
    range: StepRun
    multivalued: true
    inlined_as_list: true
    description: Step runs on the deck's edges.
  elevation:
    range: double
    description: Height in feet above grade.
  ax:
    range: double
    description: Stair top-edge start x, in feet.
  ay:
    range: double
    description: Stair top-edge start y, in feet.
  bx:
    range: double
    description: Stair top-edge end x, in feet.
  by:
    range: double
    description: Stair top-edge end y, in feet.
  openings:
    range: Opening
    multivalued: true
    inlined_as_list: true
    description: Doors and windows placed along the house's walls.
  kind:
    range: OpeningKind
    description: Whether this opening is a door or a window.
  wall:
    range: integer
    description: Index of the wall (edge) this opening sits on.
  offset:
    range: double
    description: Distance in feet from the wall's start corner to the opening.
  width:
    range: double
    description: Width of the opening, in feet.
  x:
    range: double
    description: East-west position, in feet.
  y:
    range: double
    description: North-south position, in feet.

enums:
  OpeningKind:
    description: The kind of wall opening.
    permissible_values:
      door:
        description: A doorway.
      window:
        description: A window.

  FootprintShape:
    description: The 2D footprint shape of a catalog item.
    permissible_values:
      rectangle:
        description: A `width_ft` × `depth_ft` rectangle (the default).
      circle:
        description: A circle of diameter `width_ft` (fire pits, round tables).

  PriceUnit:
    description: |-
      What a catalog item's `unit_price` is charged per. Objects are priced
      per item; drawn-area materials are priced per measured quantity (a paver
      surface per ft², mulch/gravel per yd³ at a bed's depth, edging per
      linear ft).
    permissible_values:
      per_item:
        description: Price per placed object (the default).
      per_square_foot:
        description: Price per ft² of a drawn area's surface (e.g. pavers).
      per_cubic_yard:
        description: |-
          Price per yd³ of a drawn area's volume at its depth (e.g. mulch,
          gravel) — `yd³ = ft²·depth_in / 324`.
      per_linear_foot:
        description: |-
          Price per linear ft (e.g. edging stones) — costed along a border
          ring's centerline perimeter (B5).

  ItemStatus:
    description: |-
      Whether a real item is already owned/built (existing) or still to be
      bought/built (planned). Used by `Object` (where `planned` counts toward
      cost, `existing` doesn't) and by structures (`House`/`DeckLevel`, where
      it's descriptive only — no cost math exists for structures yet).
      Orthogonal to `Object.is_virtual` — a status alone never means
      "what-if"; only `is_virtual` does.
    permissible_values:
      planned:
        description: To be bought/built.
      existing:
        description: Already owned/built.
