# cargo-deny configuration
# Run: cargo deny check
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
# Source of truth for ignored RUSTSEC advisories. `cargo audit` has no
# project-level config, so mirror this list as inline `--ignore` flags
# in `.github/workflows/security.yml` and `.pre-commit-config.yaml`.
ignore = [
    # Unmaintained crates pulled transitively by Leptos (view! macro + reactive
    # graph). Not vulnerabilities; no safe upgrades; the fix is upstream in
    # Leptos. Revisit when Leptos drops them.
    "RUSTSEC-2026-0173", # proc-macro-error2 (via leptos_macro)
    "RUSTSEC-2024-0436", # paste (via leptos / tachys)
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Intra-workspace path deps (e.g. `dokime = { path = "../dokime" }`) have no
# version requirement and would otherwise read as wildcards; allow those while
# still denying real `*` versions on registry deps.
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
