# cargo-mutants configuration.
#
# Scope mutation testing to the crates whose correctness-critical logic is
# covered by NATIVE unit tests — `cargo mutants` runs the workspace test suite
# (`nextest`), so it can only catch mutants that a native test exercises.
#
# The Leptos *view* crates (slp-ui, theoria components, slp-app) and the e2e
# crates are deliberately excluded: their behavior is verified at the browser
# layer (slp-e2e, theoria-e2e via playwright), which mutation testing cannot run,
# so mutating them yields surviving-mutant NOISE rather than signal. Pure logic
# lives in slp-core (geometry/take-off), dokime (render/count helpers),
# theoria-cli (gallery generation), and theoria-macros (the `#[story]` proc-macro:
# type mapping + doc/source extraction, covered by native unit + integration
# tests) — mutate those.
test_tool = "nextest"
examine_globs = [
    "crates/slp-core/src/**/*.rs",
    "crates/dokime/src/**/*.rs",
    "crates/theoria-cli/src/**/*.rs",
    "crates/theoria-macros/src/**/*.rs",
]
# panschema-generated code is excluded: it is codegen output (the LinkML schema is
# the source of truth, and the generator is tested upstream), not hand-written slp
# logic, and slp has no native tests targeting the generated constructors — so
# mutating it yields surviving-mutant noise, not signal (same rationale as the view
# crates above). The cost-engine logic that *uses* these types lives elsewhere in
# slp-core and stays in scope.
exclude_globs = [
    "crates/slp-core/src/generated/**/*.rs",
]
# Excluded with justification:
#  - `area` `+=`→`-=`: equivalent — the shoelace sum is negated then `.abs()`d.
#  - theoria-cli `main`/`trunk`: pure I/O orchestration (parse args, shell out to
#    `trunk`); exercised end-to-end by theoria-e2e (which builds the gallery via
#    the CLI), not by the native unit tests cargo-mutants runs.
#  - theoria-macros `story`: thin proc_macro→proc_macro2 adapter, not callable
#    outside a proc-macro context; logic lives in (and is covered via) `story_impl`.
#  - `point_in_polygon` comparison mutants: equivalent or test-an-unspecified
#    boundary. `<`→`>` is equivalent (a closed ring crosses any ray an even
#    number of times, so counting the other side preserves parity); `>`→`>=` and
#    `<`→`<=` change behavior only when the point lies exactly on a vertex/edge,
#    which the function documents as unspecified. (The `<=` pattern also covers
#    the `n < 3` guard, which is separately covered by the triangle test.)
#  - `arc_svg` `sweep: bulge > 0.0` `>`→`>=`: equivalent — `bulge_radius` returns
#    `None` for a near-zero bulge before this closure runs, so `bulge` is never 0
#    here and `> 0` and `>= 0` agree on every reachable input.
#  - `segments_cross` `>`→`>=`: equivalent. The straddle test only affects the
#    result of `dist_segment_to_segment` when the segments *properly* cross
#    (interior X): there every orientation is strictly non-zero, so `> 0` and
#    `>= 0` agree. When an orientation is exactly 0 (a touch / colinear overlap),
#    an endpoint of one segment lies on the other, so the endpoint-distance
#    fallback returns 0 regardless of what `segments_cross` decides — the flipped
#    comparison changes no observable output. (`>`→`==` *is* killed, by the
#    asymmetric-crossing tests.)
#  - `dist_segment_to_polygon` `||`→`&&` (the `point_in_polygon(a) || (b)`
#    early-out): equivalent for the convex footprints this is used on. Both
#    endpoints inside → both `||` and `&&` return 0. Exactly one inside → the
#    segment must cross an edge, so the per-edge `dist_segment_to_segment` already
#    yields 0; `&&` skipping the early-out changes nothing. Neither inside → both
#    skip it.
#  - `boundary_project` `d2 < best.0` `<`→`<=` (the only `<` left in the fn):
#    boundary-unspecified. It changes the winner only when two edges are
#    *exactly* equidistant from the point — e.g. the point lies on a shared
#    vertex, where which of the two adjacent edges' position (end-of-one ≈
#    start-of-next) is returned is documented as a near-tie and unspecified. On
#    every non-tie input `<` and `<=` agree. (The clamp's upper bound is a
#    literal `EDGE_T_MAX` const, not `1.0 - 1e-9`, so it carries no `-` to
#    mutate; the redundant `n < 2` guard was removed for the same reason.)
#  - `seam_edge` `(pos - pos.floor()) < 1e-9` `<`→`<=`: boundary-unspecified.
#    The whole-node test differs only when the fractional part equals `1e-9`
#    exactly, which no real position hits (positions are node indices, snapped
#    ends, or projections well clear of the epsilon).
#  - `edge_point` `bulge.abs() < STRAIGHT_EPS` `<`→`<=`: boundary-unspecified —
#    the straight-vs-arc threshold, agreeing except at a bulge of exactly
#    `STRAIGHT_EPS` (same near-zero tie `bulge_radius` documents).
#  - `constrain_seam` `> with >=` (all four): boundary-unspecified. `seg2 >
#    1e-18` and `(cur_frac - of).abs() > 1e-9` are epsilon guards that never see
#    their exact threshold (a segment is zero-length or clearly longer; two
#    positions coincide or differ by far more than 1e-9); `cur_frac > of` runs
#    only after that abs-difference guard proved them unequal, and `raw > of` is
#    the coincident-seam tie-break, unspecified at exact equality.
exclude_re = [
    'replace \+= with -= in area',
    'replace main -> Result',
    'replace trunk -> Result',
    'delete ! in trunk',
    'replace story -> TokenStream with Default::default\(\)',
    'replace > with >= in point_in_polygon',
    'replace < with > in point_in_polygon',
    'replace < with <= in point_in_polygon',
    'replace > with >= in arc_svg',
    'replace > with >= in segments_cross',
    'replace \|\| with && in dist_segment_to_polygon',
    'replace < with <= in boundary_project',
    'replace < with <= in seam_edge',
    'replace < with <= in edge_point',
    'replace > with >= in constrain_seam',
]
