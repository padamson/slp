# Pre-commit hooks for Rust projects
# Install: cargo install prek && prek install
# Run manually: prek run

fail_fast: true

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
        name: Check YAML syntax
      - id: check-toml
        name: Check TOML syntax
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-case-conflict
        name: Check for case conflicts
      - id: detect-private-key
        name: Detect private keys
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: mixed-line-ending
        name: Fix mixed line endings

  - repo: https://github.com/crate-ci/typos
    rev: v1.26.8
    hooks:
      - id: typos
        name: Check for typos

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Auto-format Rust code
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        description: Run clippy linter
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-check
        name: cargo check
        description: Check Rust code compiles
        entry: cargo check --workspace
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-nextest
        name: cargo nextest run
        description: Run tests with nextest
        entry: cargo nextest run --workspace
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-doctest
        name: cargo test --doc
        description: Run documentation tests
        entry: cargo test --doc --workspace
        language: system
        types: [rust]
        pass_filenames: false

      # `cargo audit` has no project-level config. For unfixable
      # transitive advisories, keep `deny.toml`'s `[advisories] ignore`
      # as source of truth and mirror them as inline `--ignore` flags
      # below, e.g.:
      #   entry: cargo audit --ignore RUSTSEC-2024-XXXX --ignore RUSTSEC-2025-YYYY
      - id: cargo-audit
        name: cargo audit
        description: Check dependencies for known vulnerabilities
        # Mirrors deny.toml [advisories] ignore (cargo audit has no project config).
        entry: cargo audit --ignore RUSTSEC-2026-0173 --ignore RUSTSEC-2024-0436
        language: system
        pass_filenames: false
        files: (Cargo\.toml|Cargo\.lock)$

      - id: cargo-deny
        name: cargo deny
        description: Check licenses, bans, and source restrictions
        entry: cargo deny check
        language: system
        pass_filenames: false
        files: (Cargo\.toml|Cargo\.lock|deny\.toml)$

      - id: cargo-vet
        name: cargo vet
        description: Verify dependency supply chain audits
        entry: cargo vet
        language: system
        pass_filenames: false
        files: (Cargo\.toml|Cargo\.lock|supply-chain/)$
